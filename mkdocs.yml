# Credits: Erwin Lejeune — 2026-02-22
site_name: epsteinexposed
site_url: https://guilyx.github.io/epsteinexposed
site_description: Unofficial Python client for the Epstein Exposed public API
repo_url: https://github.com/guilyx/epsteinexposed
repo_name: guilyx/epsteinexposed

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Sync Client: api/client.md
      - Async Client: api/async-client.md
      - Models: api/models.md
      - Exceptions: api/exceptions.md
  - Deployment: deployment.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
