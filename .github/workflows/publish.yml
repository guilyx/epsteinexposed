# Credits: Erwin Lejeune — 2026-02-22
name: Publish to PyPI

on:
  release:
    types: [published, edited]

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/epsteinexposed/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: tag_version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$TAG_NAME" == v* ]]; then
            VERSION=${TAG_NAME#v}
          else
            VERSION="$TAG_NAME"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version matches pyproject.toml
        run: |
          pip install tomli
          PYPROJECT_VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pyproject.toml=$PYPROJECT_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Skip pre-release
        id: check_prerelease
        run: |
          if [ "${{ github.event.release.prerelease }}" == "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check_prerelease.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
